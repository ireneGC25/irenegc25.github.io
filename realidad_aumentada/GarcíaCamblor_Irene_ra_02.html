<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba 3D</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

  <a-scene>

    <!-- Fondo -->
    <a-sky color="#222"></a-sky>

    <!-- Suelo -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="6"
      height="6"
      color="#555">
    </a-plane>

    <!-- Contenedor del objeto -->
    <a-entity id="modelo" position="0 0 -4">

      <!-- Cuerpo principal -->
      <a-cylinder
        position="0 0.6 0"
        radius="0.15"
        height="1.5"
        color="grey">
      </a-cylinder>

      

      <!-- Detalle frontal -->
      <a-sphere
        position="0 1.1 0.20"
        radius="0.07"
        color="red">
      </a-sphere>
	  
	        <!-- Detalle frontal -->
      <a-sphere
        position="0 0.9 0.20"
        radius="0.07"
        color="orange">
      </a-sphere>
	  
	       <!-- Detalle frontal -->
      <a-sphere
        position="0 0.7 0.20"
        radius="0.07"
        color="green">
		
      </a-sphere>

    </a-entity>

    <!-- Cámara -->
    <a-camera position="0 1.6 0"></a-camera>

  </a-scene>

</body>
</html>
